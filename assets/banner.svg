<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e15" />
      <stop offset="50%" stop-color="#141829" />
      <stop offset="100%" stop-color="#07080c" />
    </linearGradient>

    <!-- Glowing Theme Gradient -->
    <linearGradient id="themeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f">
        <animate attributeName="stop-color" values="#ff007f;#00f2fe;#ff007f" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#7928ca">
        <animate attributeName="stop-color" values="#7928ca;#21d4fd;#7928ca" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00f2fe">
        <animate attributeName="stop-color" values="#00f2fe;#ff007f;#00f2fe" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Node Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .title-text {
      font-family: 'Outfit', 'Inter', system-ui, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: url(#themeGrad);
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      font-size: 16px;
      fill: #a0aec0;
      letter-spacing: 4px;
    }
    .floating-circle {
      animation: float 4s ease-in-out indefinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="250" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="250" rx="16" fill="none" stroke="#2d3748" stroke-width="1.5" />

  <!-- Decorative Grid -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,250 M 200,0 L 200,250 M 300,0 L 300,250 M 400,0 L 400,250 M 500,0 L 500,250 M 600,0 L 600,250 M 700,0 L 700,250" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Abstract Vector Art (Style Transfer Concept: Content and Style Nodes fusing) -->
  <g transform="translate(580, 50)" filter="url(#glow)">
    <!-- Connecting network lines -->
    <path d="M 40,40 L 120,40 M 40,40 L 80,100 M 120,40 L 80,100 M 80,100 L 80,150" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2" stroke-dasharray="4,4" />
    
    <!-- Content Node -->
    <circle cx="40" cy="40" r="16" fill="#00f2fe">
      <animate attributeName="r" values="16;18;16" dur="3s" repeatCount="indefinite" />
    </circle>
    <text x="40" y="45" font-family="sans-serif" font-size="10" fill="#000" font-weight="bold" text-anchor="middle">C</text>

    <!-- Style Node -->
    <circle cx="120" cy="40" r="16" fill="#ff007f">
      <animate attributeName="r" values="16;14;16" dur="3s" repeatCount="indefinite" />
    </circle>
    <text x="120" y="45" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold" text-anchor="middle">S</text>

    <!-- Synthesis Node -->
    <circle cx="80" cy="100" r="22" fill="url(#themeGrad)">
      <animate attributeName="transform" type="scale" values="1;1.05;1" dur="4s" repeatCount="indefinite" />
    </circle>
    <text x="80" y="104" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold" text-anchor="middle">ST</text>
  </g>

  <!-- Text Group -->
  <g transform="translate(60, 110)">
    <text class="title-text" x="0" y="0">AWESOME STYLE TRANSFER</text>
    <text class="subtitle-text" x="5" y="40">CURATED HISTORY, VARIANTS &amp; APPLICATIONS</text>
  </g>
</svg>
